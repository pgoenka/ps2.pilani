<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ps2.pilani - PS-II Statistics</title>
    <meta name="description" content="Interactive insights from historical PS-II allotments at BITS Pilani.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <!-- Chart.js for Visualizations -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Mobile Toggle Button -->
        <button id="mobile-menu-btn" class="mobile-menu-btn">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        
        <!-- Mobile Overlay -->
        <div id="mobile-overlay" class="mobile-overlay"></div>

        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <h1>ps2.pilani</h1>
                <span class="subtitle">by Pratyush Goenka</span>
            </div>
            
            <nav class="nav-links">
                <button class="nav-btn active" data-route="dashboard">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </button>
                <button class="nav-btn" data-route="companies">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                    Companies
                </button>
                <button class="nav-btn" data-route="branches">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><circle cx="18" cy="18" r="3"></circle><circle cx="6" cy="6" r="3"></circle><path d="M13 6h3a2 2 0 0 1 2 2v7"></path><line x1="6" y1="9" x2="6" y2="21"></line></svg>
                    Branches
                </button>
                <button class="nav-btn" data-route="cgpa">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                    CGPA Explorer
                </button>
            </nav>

            <div class="filters-section">
                <h3>Filters</h3>
                
                <div class="filter-group">
                    <label>Search Station</label>
                    <input type="text" id="filter-search" placeholder="e.g. Nutanix, Goldman...">
                </div>

                <div class="filter-group">
                    <label>Branch</label>
                    <select id="filter-branch">
                        <option value="ALL">All Branches</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Semester</label>
                    <select id="filter-semester">
                        <option value="ALL">Both Semesters</option>
                        <option value="1">Sem 1</option>
                        <option value="2">Sem 2</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Max CGPA: <span id="cgpa-val">10.00</span></label>
                    <input type="range" id="filter-cgpa" min="0" max="10" step="0.1" value="10">
                </div>

                <button id="reset-filters" class="btn-secondary">Reset Filters</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <button class="header-brand" id="brand-btn" data-route="dashboard">
                    <h1 class="brand-title">ps2.pilani</h1>
                    <span class="brand-subtitle">by Pratyush Goenka</span>
                </button>
                <div class="header-titles">
                    <h2 id="page-title">PS-II Statistics</h2>
                    <p id="page-subtitle">Interactive insights from historical PS-II allotments.</p>
                </div>
            </header>
            
            <div id="loader" class="loader">
                <div class="spinner"></div>
                <p>Loading dataset...</p>
            </div>

            <div id="content-area" class="content-area hidden">
                <!-- Dynamic content injected here -->
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
